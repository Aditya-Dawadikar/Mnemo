services:

  app:
    build: ./app
    container_name: mnemo_app
    ports:
      - "8000:8000"
    depends_on:
      ollama:
        condition: service_healthy
      postgres:
        condition: service_started
      kokoro:
        condition: service_started
      whisper:
        condition: service_started
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=mnemo
      - DB_USER=mnemo
      - DB_PASSWORD=mnemo
      - OLLAMA_URL=http://ollama:11434
      - OLLAMA_MODEL=llama3.2:3b
      - OLLAMA_NUM_CTX=2048
      - TTS_URL=http://kokoro:8880
      - WHISPER_URL=http://whisper:8001
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: mnemo_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
      - ./ollama/startup.sh:/usr/local/bin/ollama-startup.sh:ro
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - OLLAMA_MODEL=llama3.2:3b
      - REQUIRE_GPU=1
      - OLLAMA_NUM_PARALLEL=1
      - OLLAMA_MAX_LOADED_MODELS=1
    # command: ["sh", "/usr/local/bin/ollama-startup.sh"]
    entrypoint: ["/usr/local/bin/ollama-startup.sh"]
    healthcheck:
      test: ["CMD-SHELL", "ollama list 2>/dev/null | awk 'NR>1 {print $1}' | grep -Fxq \"$${OLLAMA_MODEL:-llama3.2:3b}\""]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 10s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

  kokoro:
    build: ./kokoro
    container_name: mnemo_kokoro
    ports:
      - "8880:8880"
    volumes:
      - kokoro_cache:/root/.cache/huggingface
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

  whisper:
    build: ./whisper
    container_name: mnemo_whisper
    ports:
      - "8001:8001"
    volumes:
      - whisper_cache:/root/.cache/huggingface
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped

  postgres:
    image: pgvector/pgvector:pg16
    container_name: mnemo_postgres
    environment:
      POSTGRES_DB: mnemo
      POSTGRES_USER: mnemo
      POSTGRES_PASSWORD: mnemo
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  ollama_data:
  postgres_data:
  kokoro_cache:
  whisper_cache: